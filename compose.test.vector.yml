name: aios-brain-test-vector
# Optional pgvector test Postgres for the DENSE-retrieval data-mechanics test.
# Same as compose.test.yml but the `pgvector/pgvector` image (so `create extension vector`
# works) on offset port 5435. Used by `npm run db:test:vector:up` + `test:datamechanics:vector`;
# the default test tier stays on stock postgres:16 (compose.test.yml).
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app_test
    ports: ["5436:5432"]
    tmpfs: ["/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app_test"]
      interval: 2s
      timeout: 3s
      retries: 30
