name: aios-brain-test
# Local test Postgres for the data-mechanics tier (DB_BACKEND=postgres path).
# tmpfs → wiped every `up`; offset port 5434 so a local dev DB never collides
# (5433 is taken by another project's test DB on this machine).
# No Redis: the brain has no queue. The Supabase-mode parity target uses the
# project's `supabase start` stack, not this container.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app_test
    ports: ["5434:5432"]
    tmpfs: ["/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app_test"]
      interval: 2s
      timeout: 3s
      retries: 30
