name: aios-brain-test-neo4j
# Throwaway Neo4j for the Graphiti-graph read tests (lib/graph/neo4j + learning). Bolt on 7688 /
# HTTP on 7475 to avoid colliding with a local dev Neo4j (7687/7474). Used by
# `npm run db:test:neo4j:up` + `test:neo4j`; the test self-skips unless NEO4J_TEST is set.
services:
  neo4j:
    image: neo4j:5.26.2
    environment:
      NEO4J_AUTH: neo4j/testtest1
    ports: ["7688:7687", "7475:7474"]
    tmpfs: ["/data"]
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p testtest1 'RETURN 1' || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 40
