name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # Required gate: docs inventories must match the code (see docs/ARCHITECTURE.md).
  # Make this a required status check on `main` so PRs can't merge while docs drift.
  docs-drift:
    name: Docs drift guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/check-docs-drift.mjs

  brain-tests:
    name: Brain unit tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm test

  ingestion-tests:
    name: Ingestion tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ingestion
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - run: uv pip install --system -e '.[dev]'
      - run: pytest -q
