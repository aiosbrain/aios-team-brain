name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref so rapid pushes don't pile up parallel
# Postgres/build jobs. Each job already caches npm via setup-node (cache: "npm").
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Required gate: docs inventories must match the code (see docs/ARCHITECTURE.md).
  # Make this a required status check on `main` so PRs can't merge while docs drift.
  docs-drift:
    name: Docs drift guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: node scripts/check-docs-drift.mjs

  static-checks:
    name: Static checks (lint + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run check:errors

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Working-tree scan (no git history): a backstop against newly committed secrets.
      # Allowlist for example/fixture files lives in .gitleaks.toml. Pinned binary so we
      # don't depend on the licensed gitleaks-action.
      - name: Run gitleaks
        env:
          GITLEAKS_VERSION: "8.18.4"
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks detect --no-git --source . --config .gitleaks.toml --redact --no-banner --exit-code 1

  brain-tests:
    name: Brain unit tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run test:gateway-approval-contracts
      - run: npm test
      # Coverage gate: thresholds in vitest.config.ts (lib/** scope). Fails the job
      # if coverage drops below the floor. Ratchet thresholds up as tests improve.
      - run: npm run coverage

  datamechanics-tests:
    name: Data-mechanics tests (real Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app_test
        ports: ["5434:5432"]
        options: >-
          --health-cmd "pg_isready -U app -d app_test"
          --health-interval 2s --health-timeout 3s --health-retries 30
    env:
      # Matches vitest.datamechanics.config.ts (no-prod-fallback guard reads this).
      DATABASE_TEST_URL: postgres://app:app@localhost:5434/app_test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      # migrate-from-zero into the service DB (also the replay guard)
      - run: DATABASE_URL="$DATABASE_TEST_URL" npm run pg:schema
      - run: npm run test:gateway-approval
      - run: npm run test:datamechanics

  http-tests:
    name: Integration tests (HTTP)
    runs-on: ubuntu-latest
    # Now a blocking gate: the job was green on >5 consecutive `main` runs (the documented
    # promotion bar — see docs/CI-ARCHITECTURE.md). To finish the promotion, add the
    # "Integration tests (HTTP)" check to branch protection on `main` (repo Settings → Branches).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app_test
        ports: ["5434:5432"]
        options: >-
          --health-cmd "pg_isready -U app -d app_test"
          --health-interval 2s --health-timeout 3s --health-retries 30
    env:
      # Both the test process (seeding via lib/ingest) and the spawned next server read this.
      DATABASE_TEST_URL: postgres://app:app@localhost:5434/app_test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: DATABASE_URL="$DATABASE_TEST_URL" npm run pg:schema
      # Production build first; global-setup spawns `next start` against .next.
      - run: npm run build
      - run: npm run test:http
      - run: npm run test:http:gateway-approval

  ingestion-tests:
    name: Ingestion tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ingestion
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - run: uv pip install --system -e '.[dev,radar]'
      - run: pytest -q
